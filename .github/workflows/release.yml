name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $PWD "release/DtsAudioMonitor-$tag-win-x64.zip"
          $svvZip = "$env:RUNNER_TEMP\soundvolumeview-x64.zip"
          Invoke-WebRequest -Uri 'https://www.nirsoft.net/utils/soundvolumeview-x64.zip' -OutFile $svvZip
          New-Item -ItemType Directory -Force -Path SoundVolumeView | Out-Null
          Expand-Archive -Path $svvZip -DestinationPath SoundVolumeView -Force
          $out = "release/DtsAudioMonitor"
          if (Test-Path $out) { Remove-Item $out -Recurse -Force }
          dotnet publish app/DtsAudioMonitor/DtsAudioMonitor.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o $out
          Copy-Item config.json "$out/config.json" -Force
          New-Item -ItemType Directory -Force -Path "$out/SoundVolumeView" | Out-Null
          Copy-Item SoundVolumeView/SoundVolumeView.exe "$out/SoundVolumeView/" -Force
          @'
          @echo off
          cd /d "%~dp0"
          start "" "DtsAudioMonitor.exe" --minimized
          '@ | Set-Content "$out/Start DTS Audio Monitor.bat" -Encoding ASCII
          @'
          @echo off
          set LNK=%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\DTS Audio Monitor.lnk
          powershell -NoProfile -Command "$s=(New-Object -ComObject WScript.Shell).CreateShortcut($env:LNK); $s.TargetPath=Join-Path (Get-Location) 'DtsAudioMonitor.exe'; $s.Arguments='--minimized'; $s.WorkingDirectory=(Get-Location).Path; $s.Description='DTS Audio Monitor'; $s.Save()"
          '@ | Set-Content "$out/Install autostart.bat" -Encoding ASCII
          Copy-Item RELEASE_NOTES.md "$out/README.txt" -Force
          Get-ChildItem $out -Filter '*.pdb' -Recurse | Remove-Item -Force
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$out/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DTS Audio Monitor ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: release/DtsAudioMonitor-${{ github.ref_name }}-win-x64.zip
